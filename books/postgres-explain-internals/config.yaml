title: "「インデックス貼ったのに遅い」を、EXPLAIN で説明できるようになる本"
summary: "「インデックスは貼ったのに、このクエリだけ遅い」。その理由は EXPLAIN の出力に書いてあります。本書は EXPLAIN を 1 行ずつ読み解いて、遅いクエリの原因を推測ではなく自分の言葉で説明できるようになるための本です。cost / actual time / loops / BUFFERS の意味から、Seq Scan / Index Scan / Nested Loop などのノード、ページとヒープタプル、visibility map、VACUUM と MVCC、統計情報といった PostgreSQL 内部のしくみまで踏み込みます。Docker で立ち上がるサンプル DB と章別クエリ集付き。"
topics: ["postgresql", "database", "sql", "explain", "performance"]
