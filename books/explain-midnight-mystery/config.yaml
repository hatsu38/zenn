title: "午前2時のEXPLAIN ─ 実行計画は嘘をつかない"
summary: "深夜のアラートから始まる、遅いクエリの犯人捜し。2年目エンジニアの湊が、無口な先輩・桐生とともに EXPLAIN の出力を「捜査資料」として読み解いていく技術小説。物語仕立てで進みながら、EXPLAIN の実出力・cost の手計算・実行計画の読み方まで、技術書「PostgreSQL の EXPLAIN と内部のしくみ」と同じ実測値で学べます。"
topics: ["postgresql", "database", "sql", "explain", "performance"]
