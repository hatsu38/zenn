title: "PostgreSQL の EXPLAIN と内部のしくみ"
summary: "本番で遭遇した遅いクエリの原因を、EXPLAIN の出力を 1 行ずつ読んで見つけられるようになるための本。cost / actual time / loops / BUFFERS の意味に加えて、Seq Scan / Index Scan / Nested Loop などのノード、ページとヒープタプル、visibility map、VACUUM と MVCC、統計情報といった PostgreSQL 内部のしくみまで踏み込みます。Docker で立ち上がるサンプル DB と章別クエリ集付き。"
topics: ["postgresql", "database", "sql", "explain", "performance"]
