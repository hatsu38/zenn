title: "メモリが視える ─ Rubyのヒープを歩く人"
summary: "毎晩の再起動でしのいでいる、じわじわ太る Rails プロセス。深夜の障害対応で倒れたその夜から、3年目エンジニアの灯には「プロセスの中」が視えるようになった──。視えたものはコードでしか証明できない。GC.stat・ObjectSpace・ヒープダンプを武器に、メモリとGCのしくみを一段ずつ学ぶお仕事×能力小説。登場する Ruby コードと数値はすべて実測値です。"
