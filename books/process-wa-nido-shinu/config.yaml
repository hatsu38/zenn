title: "プロセスは二度死ぬ ── Rubyで暴く並行処理ミステリー"
summary: "毎朝6時のダイジェストメールが、ある日から同じ人に2通届くようになった。ログは二重、サーバーには「死んだのに消えない」プロセスの群れ。2年目エンジニアが推理小説マニアのSREと組み、fork・ゾンビプロセス・スレッド・レースコンディション・Mutex・デッドロック・GVL・Queueという並行処理の「古典トリック」を、手元で再現できるRubyコードでひとつずつ暴いていく連作ミステリー。コードと出力はすべて実測値です。"
